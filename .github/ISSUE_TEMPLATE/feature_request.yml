name: Feature request
description: Suggest a new control, sensor, or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: feature
    attributes:
      label: What would you like to see?
      description: >
        Describe the feature. If it maps to a specific NEC opcode or OSD setting,
        mention it — that makes it much easier to implement.
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Display model (if relevant)
      placeholder: "e.g. MultiSync V984Q"
