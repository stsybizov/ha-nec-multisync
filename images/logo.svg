<svg xmlns="http://www.w3.org/2000/svg" width="640" height="240" viewBox="0 0 640 240" role="img" aria-label="NEC MultiSync for Home Assistant">
  <defs>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#18bcf2"/>
      <stop offset="1" stop-color="#0a6fb5"/>
    </linearGradient>
    <linearGradient id="bezel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b2f36"/>
      <stop offset="1" stop-color="#15171c"/>
    </linearGradient>
  </defs>

  <!-- Display: bezel -->
  <rect x="40" y="46" width="210" height="132" rx="12" fill="url(#bezel)"/>
  <!-- Display: screen -->
  <rect x="54" y="60" width="182" height="104" rx="6" fill="url(#screen)"/>
  <!-- Screen sheen -->
  <path d="M54 60 H236 V96 L54 132 Z" fill="#ffffff" opacity="0.10"/>
  <!-- Power LED -->
  <circle cx="145" cy="172" r="3.5" fill="#18bcf2"/>
  <!-- Stand -->
  <rect x="120" y="178" width="50" height="10" rx="3" fill="#15171c"/>
  <rect x="100" y="188" width="90" height="9" rx="4" fill="#2b2f36"/>

  <!-- Signal / network arc, nodding to LAN control -->
  <g fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.9">
    <path d="M150 122 a26 26 0 0 1 36 0" opacity="0.5"/>
    <path d="M158 130 a15 15 0 0 1 20 0" opacity="0.75"/>
  </g>
  <circle cx="168" cy="138" r="4.5" fill="#ffffff"/>

  <!-- Wordmark -->
  <text x="286" y="112" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="46" font-weight="700" fill="#e9eef3">NEC MultiSync</text>
  <text x="288" y="150" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="500" fill="#18bcf2">for Home Assistant</text>
  <rect x="288" y="162" width="300" height="3" rx="1.5" fill="#18bcf2" opacity="0.5"/>
</svg>
